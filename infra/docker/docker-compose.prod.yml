# Production — single DigitalOcean droplet
# Usage:
#   docker compose -f infra/docker/docker-compose.prod.yml --env-file .env up -d --build
#
# Build args:
#   NEXT_PUBLIC_WS_URL          — websocket URL the browser will use (e.g. wss://zeyvo.tech)
#   TELEGRAM_BOT_USERNAME       — inlined into the web bundle for the TG-login deep link
services:

  nginx:
    image: nginx:1.27-alpine
    container_name: zeyvo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/zeyvo.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - backend
      - web

  backend:
    image: zeyvo-backend:${IMAGE_TAG:-local}
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: zeyvo-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      DEVSMS_BASE_URL: ${DEVSMS_BASE_URL:-https://devsms.uz/api}
      DEVSMS_API_KEY: ${DEVSMS_API_KEY}
      DEVSMS_SERVICE_NAME: ${DEVSMS_SERVICE_NAME:-Zeyvo}
      DEVSMS_TEMPLATE_TYPE: ${DEVSMS_TEMPLATE_TYPE:-4}
    deploy:
      resources:
        limits:
          memory: 750M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    # NEXT_PUBLIC_* are inlined at build time. Set them as build args (defaults below).
    image: zeyvo-web:${IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://zeyvo.tech}
        NEXT_PUBLIC_TG_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-zeyvo_bot}
    container_name: zeyvo-web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: zeyvo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zeyvo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 150M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg-data:
  redis-data:
  nginx-cache:
