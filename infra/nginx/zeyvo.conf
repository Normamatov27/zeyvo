upstream backend  { server backend:8080; }
upstream frontend { server web:3000; }

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=10r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name zeyvo.app api.zeyvo.app;
    return 301 https://$host$request_uri;
}

# Main app (zeyvo.app)
server {
    listen 443 ssl http2;
    server_name zeyvo.app;

    ssl_certificate     /etc/letsencrypt/live/zeyvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeyvo.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.zeyvo.app wss://api.zeyvo.app https://api.telegram.org; frame-ancestors 'self' https://web.telegram.org;" always;

    # Next.js static assets — immutable cache
    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# API (api.zeyvo.app)
server {
    listen 443 ssl http2;
    server_name api.zeyvo.app;

    ssl_certificate     /etc/letsencrypt/live/zeyvo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeyvo.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # STOMP WebSocket (context-path /api, SockJS endpoint /ws)
    location /api/ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Auth endpoints — tighter rate limit (10 req/min)
    location ~ ^/api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=api_global burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
