name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: zeyvo_test
          POSTGRES_USER: zeyvo
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U zeyvo -d zeyvo_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle.kts', 'backend/**/libs.versions.toml') }}

      - name: Build & test
        working-directory: backend
        run: ./gradlew build --no-daemon
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: zeyvo_test
          POSTGRES_USER: zeyvo
          POSTGRES_PASSWORD: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-secret-minimum-32-characters-long

  web:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Lint
        run: pnpm --filter web lint

      - name: Test
        run: pnpm --filter web test

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: https://zeyvo.tech
          NEXT_PUBLIC_WS_URL: wss://zeyvo.tech
          NEXT_PUBLIC_TG_BOT_USERNAME: zeyvo_bot
