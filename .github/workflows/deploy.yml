name: Deploy to production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }},ghcr.io/${{ github.repository }}/backend:latest

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'wss://zeyvo.tech' }}
            NEXT_PUBLIC_TG_BOT_USERNAME=${{ vars.NEXT_PUBLIC_TG_BOT_USERNAME || 'zeyvo_bot' }}
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }},ghcr.io/${{ github.repository }}/web:latest

  deploy:
    name: Deploy to droplet
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            # Login so the droplet can pull private GHCR images
            echo $GITHUB_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
            cd /opt/zeyvo
            # Keep IMAGE_TAG and GHCR image paths in sync with what CI just pushed
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env 2>/dev/null || \
              echo "IMAGE_TAG=${{ github.sha }}" >> .env
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend|" .env 2>/dev/null || \
              echo "BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend" >> .env
            sed -i "s|^WEB_IMAGE=.*|WEB_IMAGE=ghcr.io/${{ github.repository }}/web|" .env 2>/dev/null || \
              echo "WEB_IMAGE=ghcr.io/${{ github.repository }}/web" >> .env
            docker compose -f infra/docker/docker-compose.prod.yml pull backend web
            # Store previous tag for rollback
            PREV_TAG=$(grep "^IMAGE_TAG=" .env | cut -d= -f2 || echo "")
            docker compose -f infra/docker/docker-compose.prod.yml up -d backend web
            # Wait for backend health
            ATTEMPTS=0
            until docker exec zeyvo-backend wget -qO- http://localhost:8080/api/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
              ATTEMPTS=$((ATTEMPTS+1))
              if [ $ATTEMPTS -ge 20 ]; then echo "Health check timeout"; exit 1; fi
              sleep 3
            done
            # Smoke tests
            curl -sf https://zeyvo.tech/api/actuator/health > /dev/null || { echo "SMOKE FAIL: health"; exit 1; }
            curl -sf https://zeyvo.tech/api/v1/branches > /dev/null || { echo "SMOKE FAIL: branches"; exit 1; }
            echo "Deploy complete: ${{ github.sha }}"
